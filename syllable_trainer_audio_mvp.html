<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Учим слоги — audio MVP</title>
  <style>
    :root {
      --bg: #fff8ec;
      --card: #ffffff;
      --ink: #23212a;
      --muted: #8a8494;
      --purple: #6f35d5;
      --purple-dark: #4c21a2;
      --red: #f24a5b;
      --blue: #3495e7;
      --green: #30b864;
      --yellow: #ffc83d;
      --soft-shadow: 0 14px 30px rgba(92, 67, 25, .12);
      --border: rgba(75, 57, 24, .12);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(255, 222, 123, .22), transparent 36%),
        radial-gradient(circle at bottom right, rgba(122, 75, 221, .13), transparent 40%),
        var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      user-select: none;
      touch-action: none;
    }

    button {
      font: inherit;
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    .app {
      height: 100dvh;
      width: 100vw;
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .screen {
      width: min(420px, 100%);
      height: min(780px, 100%);
      min-height: 620px;
      background: rgba(255, 254, 249, .86);
      border: 1px solid var(--border);
      border-radius: 34px;
      box-shadow: var(--soft-shadow);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 72px;
      display: grid;
      grid-template-columns: 56px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 14px 18px 8px;
    }

    .round-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--card);
      box-shadow: 0 7px 16px rgba(84, 49, 143, .14);
      color: var(--purple);
      font-size: 24px;
      display: grid;
      place-items: center;
    }

    .score {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 13px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 7px 14px rgba(84, 49, 143, .08);
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 7px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: #ded9e5;
    }
    .dot.done { background: var(--purple); }

    .prompt {
      text-align: center;
      font-size: 27px;
      line-height: 1.15;
      font-weight: 900;
      margin: 14px 22px 6px;
      min-height: 64px;
      display: grid;
      place-items: center;
    }

    .prompt .target {
      color: var(--red);
      display: inline-block;
      min-width: 54px;
    }

    .playfield {
      position: relative;
      flex: 1;
      min-height: 420px;
      padding: 10px 22px 20px;
    }

    .source-wrap {
      position: absolute;
      left: 34px;
      top: 172px;
      width: 112px;
      height: 112px;
      display: grid;
      place-items: center;
    }

    .letter-card {
      width: 104px;
      height: 104px;
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 12px 24px rgba(43, 25, 72, .13);
      border: 1px solid rgba(87, 65, 100, .08);
      display: grid;
      place-items: center;
      font-size: 64px;
      line-height: 1;
      font-weight: 950;
      cursor: grab;
      position: relative;
      z-index: 3;
    }

    .letter-card.dragging {
      cursor: grabbing;
      transform: scale(1.05);
      z-index: 30;
      box-shadow: 0 20px 40px rgba(43, 25, 72, .18);
    }

    .consonant { color: var(--purple); text-shadow: 0 2px 0 rgba(0,0,0,.04); }

    .options {
      position: absolute;
      right: 34px;
      top: 110px;
      display: grid;
      gap: 16px;
    }

    .option {
      width: 104px;
      height: 104px;
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 12px 24px rgba(43, 25, 72, .12);
      border: 2px solid transparent;
      display: grid;
      place-items: center;
      font-size: 64px;
      line-height: 1;
      font-weight: 950;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }

    .option:nth-child(1) { color: var(--red); }
    .option:nth-child(2) { color: var(--blue); }
    .option:nth-child(3) { color: var(--green); }

    .option.hot {
      transform: scale(1.06);
      border-color: rgba(111, 53, 213, .35);
      background: #fbf8ff;
    }

    .hint {
      position: absolute;
      left: 26px;
      right: 26px;
      bottom: 24px;
      min-height: 50px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      text-align: center;
    }

    .result-card {
      position: absolute;
      left: 50%;
      top: 135px;
      transform: translateX(-50%);
      min-width: 196px;
      min-height: 130px;
      padding: 20px 24px;
      border-radius: 26px;
      background: var(--card);
      box-shadow: 0 16px 32px rgba(43, 25, 72, .14);
      border: 1px solid rgba(87, 65, 100, .08);
      display: none;
      place-items: center;
      text-align: center;
      z-index: 50;
    }

    .result-card.show { display: grid; animation: pop .24s ease both; }

    .result-syllable {
      font-size: 74px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }
    .result-syllable .c { color: var(--purple); }
    .result-syllable .v1 { color: var(--red); }
    .result-syllable .v2 { color: var(--blue); }
    .result-syllable .v3 { color: var(--green); }

    .result-text {
      font-size: 20px;
      font-weight: 850;
    }

    .result-text.good { color: var(--purple-dark); }
    .result-text.bad { color: #cc4150; }

    .star-burst {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: none;
      z-index: 49;
    }
    .star-burst.show { display: block; }
    .burst-star {
      position: absolute;
      font-size: 26px;
      animation: twinkle .65s ease both;
    }

    .mini-pause, .start-screen {
      position: absolute;
      inset: 0;
      z-index: 90;
      background:
        radial-gradient(circle at top, rgba(255, 211, 103, .22), transparent 35%),
        rgba(255, 252, 246, .96);
      display: grid;
      place-items: center;
      padding: 26px;
      text-align: center;
    }

    .mini-pause[hidden], .start-screen[hidden] { display: none; }

    .start-title, .pause-title {
      font-size: 44px;
      line-height: 1.02;
      font-weight: 950;
      color: var(--purple);
      margin: 0 0 20px;
    }

    .cat {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      background: #ffb042;
      display: grid;
      place-items: center;
      font-size: 72px;
      margin: 8px auto 24px;
      box-shadow: 0 14px 28px rgba(198, 125, 17, .18);
    }

    .primary {
      min-width: 190px;
      min-height: 58px;
      border-radius: 999px;
      padding: 15px 28px;
      background: linear-gradient(180deg, #8249e9, #5c2ac4);
      color: white;
      font-size: 22px;
      font-weight: 850;
      box-shadow: 0 12px 24px rgba(89, 43, 189, .25);
    }

    .secondary-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .secondary {
      min-height: 48px;
      border-radius: 999px;
      padding: 12px 18px;
      background: var(--card);
      color: var(--purple-dark);
      font-weight: 850;
      box-shadow: 0 8px 18px rgba(84, 49, 143, .12);
    }

    .pause-score {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 15px 24px;
      font-size: 34px;
      font-weight: 950;
      margin-bottom: 28px;
      box-shadow: 0 10px 22px rgba(43, 25, 72, .10);
    }

    .screen.shake { animation: shake .28s ease both; }

    @keyframes pop {
      from { opacity: 0; transform: translateX(-50%) scale(.86); }
      to { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    @keyframes twinkle {
      from { opacity: 0; transform: scale(.4) translateY(10px); }
      45% { opacity: 1; }
      to { opacity: 0; transform: scale(1.25) translateY(-12px); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
    }

    @media (max-height: 680px) {
      .screen { min-height: 560px; }
      .prompt { margin-top: 4px; }
      .source-wrap { top: 145px; }
      .options { top: 92px; }
      .letter-card, .option { width: 92px; height: 92px; font-size: 58px; }
      .source-wrap { width: 96px; height: 96px; }
      .result-card { top: 104px; }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="screen" id="screen">
      <div class="topbar">
        <button class="round-btn" id="speakBtn" aria-label="Повторить задание">🔊</button>
        <div class="dots" id="dots" aria-hidden="true"></div>
        <div class="score" aria-label="Звёзды"><span>⭐</span><span id="score">0</span></div>
      </div>

      <div class="prompt" id="prompt">Сделай <span class="target">МА</span></div>

      <div class="playfield" id="playfield">
        <div class="source-wrap" id="sourceWrap">
          <div class="letter-card consonant" id="sourceLetter">М</div>
        </div>

        <div class="options" id="options"></div>

        <div class="hint" id="hint">Перетащи букву к нужной гласной или просто нажми на гласную</div>

        <div class="result-card" id="resultCard">
          <div>
            <div class="result-syllable" id="resultSyllable"></div>
            <div class="result-text" id="resultText"></div>
          </div>
        </div>

        <div class="star-burst" id="starBurst"></div>
      </div>

      <div class="start-screen" id="startScreen">
        <div>
          <h1 class="start-title">Учим<br>слоги</h1>
          <div class="cat">🐱</div>
          <button class="primary" id="startBtn">▶ Начать</button>
        </div>
      </div>

      <div class="mini-pause" id="miniPause" hidden>
        <div>
          <h2 class="pause-title">Молодец!</h2>
          <div class="cat">🐱</div>
          <div class="pause-score"><span>⭐</span><span id="pauseScore">0</span></div>
          <div class="secondary-row">
            <button class="secondary" id="againBtn">↻ Ещё раз</button>
            <button class="primary" id="continueBtn">Дальше</button>
          </div>
        </div>
      </div>
    </section>
  </main>

<script>
(() => {
  const consonants = ["М", "Б", "П", "Л", "С"];
  const vowels = ["А", "О", "У", "И"];
  const sessionLength = 7;

  // Файлы должны лежать рядом с HTML в папке audio/
  // Пример: index.html + audio/ma.mp3
  const audioMap = {
    make_syllable: "audio/make_syllable.mp3",
    need: "audio/need.mp3",

    "МА": "audio/ma.mp3",
    "МО": "audio/mo.mp3",
    "МУ": "audio/mu.mp3",
    "МИ": "audio/mi.mp3",

    "БА": "audio/ba.mp3",
    "БО": "audio/bo.mp3",
    "БУ": "audio/bu.mp3",
    "БИ": "audio/bi.mp3",

    "ПА": "audio/pa.mp3",
    "ПО": "audio/po.mp3",
    "ПУ": "audio/pu.mp3",
    "ПИ": "audio/pi.mp3",

    "ЛА": "audio/la.mp3",
    "ЛО": "audio/lo.mp3",
    "ЛУ": "audio/lu.mp3",
    "ЛИ": "audio/li.mp3",

    "СА": "audio/sa.mp3",
    "СО": "audio/so.mp3",
    "СУ": "audio/su.mp3",
    "СИ": "audio/si.mp3"
  };

  const state = {
    score: 0,
    step: 0,
    task: null,
    locked: false,
    drag: null,
    lastTaskKey: null,
    sequenceToken: 0,
    currentAudio: null,
  };

  const els = {
    screen: document.getElementById("screen"),
    speakBtn: document.getElementById("speakBtn"),
    dots: document.getElementById("dots"),
    score: document.getElementById("score"),
    prompt: document.getElementById("prompt"),
    sourceWrap: document.getElementById("sourceWrap"),
    sourceLetter: document.getElementById("sourceLetter"),
    options: document.getElementById("options"),
    resultCard: document.getElementById("resultCard"),
    resultSyllable: document.getElementById("resultSyllable"),
    resultText: document.getElementById("resultText"),
    starBurst: document.getElementById("starBurst"),
    startScreen: document.getElementById("startScreen"),
    startBtn: document.getElementById("startBtn"),
    miniPause: document.getElementById("miniPause"),
    pauseScore: document.getElementById("pauseScore"),
    continueBtn: document.getElementById("continueBtn"),
    againBtn: document.getElementById("againBtn"),
  };

  function shuffle(array) {
    const a = [...array];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function pickDifferent(list, except) {
    const filtered = list.filter(x => x !== except);
    return filtered[Math.floor(Math.random() * filtered.length)];
  }

  function generateTask() {
    let consonant, correct, wrong, key;

    // Небольшая защита от полного повтора предыдущего задания
    for (let i = 0; i < 10; i++) {
      consonant = consonants[Math.floor(Math.random() * consonants.length)];
      correct = vowels[Math.floor(Math.random() * vowels.length)];
      wrong = pickDifferent(vowels, correct);
      key = consonant + correct + wrong;
      if (key !== state.lastTaskKey) break;
    }

    state.lastTaskKey = key;

    // Иногда 3 варианта, чаще 2.
    let options = [correct, wrong];
    if (Math.random() < 0.25) {
      const third = vowels.find(v => v !== correct && v !== wrong);
      options.push(third);
    }

    return {
      consonant,
      correct,
      target: consonant + correct,
      options: shuffle(options)
    };
  }

  function renderDots() {
    els.dots.innerHTML = "";
    for (let i = 0; i < sessionLength; i++) {
      const dot = document.createElement("div");
      dot.className = "dot" + (i < state.step ? " done" : "");
      els.dots.appendChild(dot);
    }
  }

  function renderTask(task) {
    state.task = task;
    state.locked = false;

    els.prompt.innerHTML = `Сделай <span class="target">${task.target}</span>`;
    els.sourceLetter.textContent = task.consonant;
    resetSourcePosition();

    els.options.innerHTML = "";
    task.options.forEach(vowel => {
      const btn = document.createElement("button");
      btn.className = "option";
      btn.type = "button";
      btn.textContent = vowel;
      btn.dataset.vowel = vowel;
      btn.addEventListener("click", () => choose(vowel));
      els.options.appendChild(btn);
    });

    els.resultCard.classList.remove("show");
    els.starBurst.classList.remove("show");
    renderDots();
    playTaskAudio(task.target);
  }


  function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function stopAudioSequence() {
    state.sequenceToken++;
    if (state.currentAudio) {
      try {
        state.currentAudio.pause();
        state.currentAudio.currentTime = 0;
      } catch (e) {}
      state.currentAudio = null;
    }
  }

  function playAudio(key) {
    const src = audioMap[key];

    if (!src) {
      console.warn("No audio source for key:", key);
      return Promise.resolve();
    }

    return new Promise(resolve => {
      const audio = new Audio(src);
      audio.preload = "auto";
      state.currentAudio = audio;

      const finish = () => {
        if (state.currentAudio === audio) state.currentAudio = null;
        resolve();
      };

      audio.addEventListener("ended", finish, { once: true });
      audio.addEventListener("error", () => {
        console.warn("Audio failed:", key, src);
        finish();
      }, { once: true });

      const playPromise = audio.play();
      if (playPromise && typeof playPromise.catch === "function") {
        playPromise.catch(err => {
          console.warn("Audio play blocked/failed:", key, err);
          finish();
        });
      }
    });
  }

  async function playSequence(keys, pauseMs = 120) {
    const token = ++state.sequenceToken;

    for (const key of keys) {
      if (token !== state.sequenceToken) return;
      await playAudio(key);
      if (token !== state.sequenceToken) return;
      await wait(pauseMs);
    }
  }

  function playTaskAudio(target) {
    return playSequence(["make_syllable", target], 130);
  }

  function playSuccessAudio(syllable) {
    return playSequence([syllable], 0);
  }

  function playErrorAudio(actual, target) {
    // "МИ. Нужно МА."
    return playSequence([actual, "need", target], 170);
  }

  function preloadAudio() {
    Object.values(audioMap).forEach(src => {
      const audio = new Audio(src);
      audio.preload = "auto";
      audio.load();
    });
  }

  function coloredSyllable(consonant, vowel) {
    const optionIndex = state.task.options.indexOf(vowel);
    const cls = optionIndex === 0 ? "v1" : optionIndex === 1 ? "v2" : "v3";
    return `<span class="c">${consonant}</span><span class="${cls}">${vowel}</span>`;
  }

  function choose(vowel) {
    if (state.locked) return;
    state.locked = true;
    stopAudioSequence();

    clearHotOptions();

    const syllable = state.task.consonant + vowel;
    const isCorrect = vowel === state.task.correct;

    els.resultSyllable.innerHTML = coloredSyllable(state.task.consonant, vowel);
    els.resultCard.classList.add("show");

    if (isCorrect) {
      els.resultText.className = "result-text good";
      els.resultText.textContent = syllable;
      state.score += 1;
      state.step += 1;
      els.score.textContent = state.score;
      burst();
      playSuccessAudio(syllable);

      setTimeout(() => {
        if (state.step >= sessionLength) {
          showPause();
        } else {
          renderTask(generateTask());
        }
      }, 850);
    } else {
      els.resultText.className = "result-text bad";
      els.resultText.textContent = `Нужно ${state.task.target}`;
      els.screen.classList.add("shake");
      playErrorAudio(syllable, state.task.target);

      setTimeout(() => {
        els.screen.classList.remove("shake");
        els.resultCard.classList.remove("show");
        resetSourcePosition();
        state.locked = false;
        playTaskAudio(state.task.target);
      }, 1500);
    }
  }

  function burst() {
    els.starBurst.innerHTML = "";
    const positions = [
      [20, 24], [72, 20], [18, 58], [78, 56], [48, 16], [52, 64]
    ];
    positions.forEach(([x, y], i) => {
      const star = document.createElement("div");
      star.className = "burst-star";
      star.textContent = "⭐";
      star.style.left = `${x}%`;
      star.style.top = `${y}%`;
      star.style.animationDelay = `${i * 45}ms`;
      els.starBurst.appendChild(star);
    });
    els.starBurst.classList.add("show");
    setTimeout(() => els.starBurst.classList.remove("show"), 750);
  }

  function showPause() {
    renderDots();
    els.pauseScore.textContent = state.score;
    els.miniPause.hidden = false;
    speak("Молодец!");
  }

  function newSession(resetScore = false) {
    if (resetScore) state.score = 0;
    state.step = 0;
    els.score.textContent = state.score;
    els.miniPause.hidden = true;
    renderTask(generateTask());
  }

  function resetSourcePosition() {
    els.sourceLetter.style.transform = "";
    els.sourceLetter.classList.remove("dragging");
  }

  function clearHotOptions() {
    els.options.querySelectorAll(".option").forEach(o => o.classList.remove("hot"));
  }

  function optionAtPoint(x, y) {
    const options = [...els.options.querySelectorAll(".option")];
    return options.find(el => {
      const r = el.getBoundingClientRect();
      return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
    });
  }

  function onPointerDown(e) {
    if (state.locked) return;
    e.preventDefault();

    const r = els.sourceLetter.getBoundingClientRect();
    state.drag = {
      pointerId: e.pointerId,
      startX: e.clientX,
      startY: e.clientY,
      baseLeft: r.left,
      baseTop: r.top,
    };

    els.sourceLetter.setPointerCapture(e.pointerId);
    els.sourceLetter.classList.add("dragging");
  }

  function onPointerMove(e) {
    if (!state.drag || state.drag.pointerId !== e.pointerId || state.locked) return;
    e.preventDefault();

    const dx = e.clientX - state.drag.startX;
    const dy = e.clientY - state.drag.startY;

    els.sourceLetter.style.transform = `translate(${dx}px, ${dy}px) scale(1.05)`;

    clearHotOptions();
    const hot = optionAtPoint(e.clientX, e.clientY);
    if (hot) hot.classList.add("hot");
  }

  function onPointerUp(e) {
    if (!state.drag || state.drag.pointerId !== e.pointerId || state.locked) return;
    e.preventDefault();

    const target = optionAtPoint(e.clientX, e.clientY);
    state.drag = null;
    els.sourceLetter.classList.remove("dragging");

    if (target) {
      choose(target.dataset.vowel);
    } else {
      resetSourcePosition();
      clearHotOptions();
    }
  }

  els.sourceLetter.addEventListener("pointerdown", onPointerDown);
  els.sourceLetter.addEventListener("pointermove", onPointerMove);
  els.sourceLetter.addEventListener("pointerup", onPointerUp);
  els.sourceLetter.addEventListener("pointercancel", onPointerUp);

  els.speakBtn.addEventListener("click", () => {
    if (state.task) {
      stopAudioSequence();
      playTaskAudio(state.task.target);
    }
  });

  els.startBtn.addEventListener("click", () => {
    preloadAudio();
    els.startScreen.hidden = true;
    newSession(true);
  });

  els.continueBtn.addEventListener("click", () => newSession(false));
  els.againBtn.addEventListener("click", () => newSession(true));

  renderDots();
})();
</script>
</body>
</html>
