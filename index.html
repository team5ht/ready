<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Учим слоги — audio MVP v7</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <main class="app">
    <section class="screen" id="screen">
      <div class="topbar">
        <button class="round-btn" id="speakBtn" aria-label="Повторить задание">🔊</button>
        <div class="dots" id="dots" aria-hidden="true"></div>
        <div class="score" aria-label="Звёзды"><span>⭐</span><span id="score">0</span></div>
      </div>

      <div class="prompt" id="prompt">
        <div class="prompt-title">Слушай</div>
      </div>

      <div class="playfield" id="playfield">
        <div class="source-wrap" id="sourceWrap">
          <div class="letter-card consonant" id="sourceLetter">М</div>
        </div>

        <div class="options" id="options"></div>

        <div class="hint" id="hint">
          <button class="hint-toggle" id="hintToggle" type="button" aria-label="Подсказка" aria-expanded="false">?</button>
          <div class="hint-answer" id="hintAnswer" hidden></div>
        </div>

        <div class="result-card" id="resultCard">
          <div>
            <div class="result-syllable" id="resultSyllable"></div>
            <div class="result-text" id="resultText"></div>
          </div>
        </div>

        <div class="star-burst" id="starBurst"></div>
      </div>

      <div class="start-screen" id="startScreen">
        <div>
          <h1 class="start-title">Учим<br>слоги</h1>
          <div class="cat">🐱</div>
          <button class="primary" id="startBtn">▶ Начать</button>
        </div>
      </div>

      <div class="mini-pause" id="miniPause" hidden>
        <div>
          <h2 class="pause-title">Молодец!</h2>
          <div class="cat">🐱</div>
          <div class="pause-score"><span>⭐</span><span id="pauseScore">0</span></div>
          <div class="secondary-row">
            <button class="secondary" id="againBtn">↻ Ещё раз</button>
            <button class="primary" id="continueBtn">Дальше</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/game.js"></script>
  <script src="js/drag.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
